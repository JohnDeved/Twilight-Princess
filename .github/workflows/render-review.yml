name: Render Review Helpers

# Runs on every PR targeting any branch.
# Performs:
#   1. clang-format check — posts a suggestion comment if formatting differs
#   2. cppcheck / clang-tidy on render backend — reports warnings as annotations
#   3. Uploads frame diff images from the latest port-test run as a comment artifact

on:
  pull_request:
    paths:
      - 'src/pal/**'
      - 'include/pal/**'
      - 'src/pc/**'
      - 'include/pc/**'
      - 'tools/frame_compare/**'
      - 'tools/render_dev.py'
      - 'CMakeLists.txt'

jobs:
  # --------------------------------------------------------------------------
  # 1. clang-format check
  # --------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format

      - name: Find changed C/C++ files in render backend
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Gather C/C++ files touched by this PR that are in the render backend.
          # Use null-terminated output (-z) and xargs for safe handling of filenames.
          FILES=$(git diff --name-only -z "$BASE" "$HEAD" -- \
            'src/pal/' 'include/pal/' 'src/pc/' 'include/pc/' \
            | tr '\0' '\n' \
            | grep -E '\.(cpp|cc|cxx|c|h|hpp)$' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "No render backend C/C++ files changed."
          else
            echo "Changed files: $FILES"
          fi

      - name: Run clang-format
        if: steps.changed.outputs.files != ''
        id: fmt
        run: |
          CHANGED="${{ steps.changed.outputs.files }}"
          DIFF_OUTPUT=""
          EXIT=0
          for f in $CHANGED; do
            if [ -f "$f" ]; then
              FORMATTED=$(clang-format --style=file "$f" 2>/dev/null)
              ORIGINAL=$(cat "$f")
              if [ "$FORMATTED" != "$ORIGINAL" ]; then
                FILE_DIFF=$(diff -u "$f" <(echo "$FORMATTED") || true)
                DIFF_OUTPUT="$DIFF_OUTPUT\n\`\`\`diff\n$FILE_DIFF\n\`\`\`\n"
                EXIT=1
              fi
            fi
          done
          if [ $EXIT -ne 0 ]; then
            echo "diff_output<<EOF" >> $GITHUB_OUTPUT
            printf "%b" "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Post formatting comment
        if: steps.fmt.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          DIFF_OUTPUT: ${{ steps.fmt.outputs.diff_output }}
        with:
          script: |
            // Read diff content from env to avoid injection via template literal interpolation
            const diff = process.env.DIFF_OUTPUT || '';
            const body = [
              '## 🎨 clang-format Suggestion',
              '',
              'The following render backend files need formatting adjustments according to `.clang-format`:',
              '',
              diff,
              '',
              'To auto-fix locally:',
              '```bash',
              'clang-format --style=file -i src/pal/**/*.cpp include/pal/**/*.h',
              '```',
              'Or use `git clang-format HEAD~1` to format only changed lines.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('clang-format Suggestion')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # --------------------------------------------------------------------------
  # 2. cppcheck static analysis — only on files changed in this PR
  # --------------------------------------------------------------------------
  cppcheck:
    name: cppcheck (changed files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cppcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cppcheck

      - name: Find changed C/C++ files
        id: changed_cpp
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Only scan C/C++ source files that were actually touched by this PR.
          # Using -z / tr for safe filename handling.
          # Filter through [ -f ] to skip files deleted in this PR — cppcheck
          # errors out when given a nonexistent path.
          FILES=$(git diff --name-only -z "$BASE" "$HEAD" \
            | tr '\0' '\n' \
            | grep -E '\.(cpp|cc|cxx|c|h|hpp)$' \
            | grep -E '^(src/pal/|include/pal/|src/pc/|include/pc/)' \
            | while IFS= read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done \
            || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "No C/C++ render-backend files changed — skipping cppcheck."
          else
            echo "cppcheck targets: $FILES"
          fi

      - name: Run cppcheck on changed files
        id: cppcheck
        if: steps.changed_cpp.outputs.files != ''
        run: |
          # Run cppcheck only on C/C++ files changed by this PR.
          # Scoping to changed files avoids false positives from unrelated shared
          # headers (e.g. include/revolution/os.h) that are pulled in transitively.
          mkdir -p cppcheck-results
          # Build the file list for cppcheck (one file per line → positional args)
          readarray -t FILES <<< "${{ steps.changed_cpp.outputs.files }}"
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --inline-suppr \
            --xml --xml-version=2 \
            -I include \
            -I include/pal \
            -I include/pal/gx \
            "${FILES[@]}" \
            2> cppcheck-results/cppcheck.xml || true

          # Convert XML to human-readable JSON for annotation and comment steps
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, json
          try:
              tree = ET.parse('cppcheck-results/cppcheck.xml')
              root = tree.getroot()
              issues = []
              for error in root.iter('error'):
                  severity = error.get('severity', 'unknown')
                  if severity in ('information',):
                      continue
                  msg = error.get('msg', '')
                  eid = error.get('id', '')
                  for loc in error.findall('location'):
                      f = loc.get('file', '')
                      line = loc.get('line', '0')
                      issues.append({'file': f, 'line': int(line), 'severity': severity, 'id': eid, 'msg': msg})
              with open('cppcheck-results/issues.json', 'w') as out:
                  json.dump(issues, out, indent=2)
              print(f'cppcheck: {len(issues)} issues found')
          except Exception as e:
              print(f'cppcheck parse error: {e}')
              with open('cppcheck-results/issues.json', 'w') as out:
                  json.dump([], out)
          PYEOF

          echo "issues_count=$(python3 -c "import json; d=json.load(open('cppcheck-results/issues.json')); print(len(d))")" >> $GITHUB_OUTPUT

      - name: Write empty results when no files changed
        if: steps.changed_cpp.outputs.files == ''
        run: |
          mkdir -p cppcheck-results
          echo '[]' > cppcheck-results/issues.json
          echo "issues_count=0" >> $GITHUB_OUTPUT

      - name: Emit GitHub annotations for cppcheck issues
        if: steps.cppcheck.outputs.issues_count != '0'
        run: |
          python3 - <<'PYEOF'
          import json
          issues = json.load(open('cppcheck-results/issues.json'))
          for issue in issues:
              level = 'warning' if issue['severity'] in ('warning','performance','portability') else 'notice'
              f = issue['file']
              line = issue['line']
              msg = f"[cppcheck/{issue['id']}] {issue['msg']}"
              print(f"::{level} file={f},line={line}::{msg}")
          PYEOF

      - name: Post cppcheck summary comment
        if: steps.cppcheck.outputs.issues_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issues = [];
            try { issues = JSON.parse(fs.readFileSync('cppcheck-results/issues.json', 'utf8')); } catch(e) {}
            if (issues.length === 0) return;
            let body = `## 🔍 cppcheck: ${issues.length} issue(s) in render backend\n\n`;
            body += `| File | Line | Severity | Issue |\n|---|---|---|---|\n`;
            for (const i of issues.slice(0, 20)) {
              const f = i.file.replace(/^.*src\/pal\//, 'src/pal/');
              body += `| \`${f}\` | ${i.line} | ${i.severity} | \`${i.id}\`: ${i.msg} |\n`;
            }
            if (issues.length > 20) body += `\n_…and ${issues.length - 20} more. See artifacts._\n`;
            body += '\nFix these issues or add `// cppcheck-suppress <issue-id>` inline suppression if intentional.';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('cppcheck:')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload cppcheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-results
          path: cppcheck-results/
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # 3. Post frame diff images from the latest port-test CI run
  # --------------------------------------------------------------------------
  post-frame-diffs:
    name: Post frame diff images
    runs-on: ubuntu-latest
    # Only run if a port-test run has completed for this PR
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Download frame-compare artifacts from latest port-test run
        uses: actions/github-script@v7
        id: download_diffs
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find the most recent completed port-test run for this PR's head SHA
            const headSha = context.payload.pull_request.head.sha;
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'pull_request',
              status: 'completed',
              per_page: 10,
            });

            const portRun = runs.workflow_runs.find(r =>
              r.name === 'Port Test (PC Headless)' && r.head_sha === headSha
            );

            if (!portRun) {
              console.log('No completed port-test run found for this commit.');
              core.setOutput('has_diffs', 'false');
              return;
            }

            // List artifacts from that run
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: portRun.id,
            });

            const resultsArtifact = artifacts.artifacts.find(a => a.name === 'port-test-results');
            if (!resultsArtifact) {
              console.log('No port-test-results artifact found.');
              core.setOutput('has_diffs', 'false');
              return;
            }

            core.setOutput('has_diffs', 'true');
            core.setOutput('run_id', portRun.id.toString());
            core.setOutput('artifact_url',
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${portRun.id}`);

      - name: Post frame diff comment
        if: steps.download_diffs.outputs.has_diffs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = '${{ steps.download_diffs.outputs.run_id }}';
            const artifactUrl = '${{ steps.download_diffs.outputs.artifact_url }}';

            let body = `## 📊 Frame Diff Images\n\n`;
            body += `Frame comparison diff images from the latest port-test run are available in the CI artifacts.\n\n`;
            body += `🔗 [**Download frame_compare_diffs from port-test-results**](${artifactUrl})\n\n`;
            body += `The diff images show (**left**: PC port capture | **center**: GCN reference | **right**: amplified diff ×8).\n`;
            body += `If no reference frames exist yet, see \`tests/reference_frames/README.md\` for setup instructions.\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Frame Diff Images')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # --------------------------------------------------------------------------
  # 4. frame_compare.py self-test
  #    Runs the tool against an empty reference directory to confirm it exits
  #    cleanly with --allow-missing-reference and produces valid JSON output.
  # --------------------------------------------------------------------------
  frame-compare-selftest:
    name: frame_compare self-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run frame_compare with no reference frames (expect exit 0)
        run: |
          # Confirm the tool handles the "no reference frames yet" case gracefully.
          # Uses a temporary empty directory as the captured-frames source so the
          # test is fully self-contained without needing a built binary.
          mkdir -p /tmp/fc_selftest_caps /tmp/fc_selftest_diffs

          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  /tmp/fc_selftest_caps/ \
            --reference-dir tests/reference_frames/ \
            --diff-dir      /tmp/fc_selftest_diffs/ \
            --threshold     0.05 \
            --json-out      /tmp/fc_selftest_results.json \
            --allow-missing-reference

          echo "✅ frame_compare exited 0 with --allow-missing-reference"

      - name: Validate JSON output is well-formed
        run: |
          python3 - <<'PYEOF'
          import json, sys

          with open('/tmp/fc_selftest_results.json') as f:
              data = json.load(f)

          assert 'results' in data, "JSON missing 'results' key"
          assert 'passed' in data,  "JSON missing 'passed' key"
          assert isinstance(data['results'], list), "'results' must be a list"
          assert data['passed'] is True, f"Expected passed=True, got {data['passed']}"

          print(f"✅ JSON valid: passed={data['passed']}, results={len(data['results'])}")
          PYEOF

      - name: Run frame_compare with synthetic identical BMPs (expect pass)
        run: |
          # Create a tiny identical 4x4 BMP pair and confirm RMSE=0 / pass.
          python3 - <<'PYEOF'
          import struct, os

          def write_bmp(path, w, h, rgb):
              row_size = (w * 3 + 3) & ~3
              pd_size  = row_size * h
              hdr = struct.pack('<2sIHHI', b'BM', 54 + pd_size, 0, 0, 54)
              dib = struct.pack('<IiiHHIIiiII', 40, w, -h, 1, 24, 0, pd_size, 2835, 2835, 0, 0)
              row = bytes([rgb[2], rgb[1], rgb[0]] * w) + bytes(row_size - w * 3)
              with open(path, 'wb') as f:
                  f.write(hdr + dib + row * h)

          os.makedirs('/tmp/fc_caps2', exist_ok=True)
          os.makedirs('/tmp/fc_refs2', exist_ok=True)
          write_bmp('/tmp/fc_caps2/frame_0030.bmp', 4, 4, (200, 100, 50))
          write_bmp('/tmp/fc_refs2/frame_0030.bmp', 4, 4, (200, 100, 50))
          print('Synthetic BMPs written')
          PYEOF

          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  /tmp/fc_caps2/ \
            --reference-dir /tmp/fc_refs2/ \
            --diff-dir      /tmp/fc_diffs2/ \
            --threshold     0.05 \
            --json-out      /tmp/fc_results2.json

          python3 - <<'PYEOF'
          import json
          data = json.load(open('/tmp/fc_results2.json'))
          assert data['passed'], f"Expected pass for identical frames, got: {data}"
          r = data['results'][0]
          assert r['rmse'] == 0.0, f"Expected rmse=0.0, got {r['rmse']}"
          print(f"✅ Identical-frame test: rmse={r['rmse']}, passed={r['passed']}")
          PYEOF

      - name: Run frame_compare with differing BMPs above threshold (expect fail)
        run: |
          # Create a BMP pair that differs enough to exceed RMSE 0.05 and verify
          # the tool correctly returns exit code 1.
          python3 - <<'PYEOF'
          import struct, os

          def write_bmp(path, w, h, rgb):
              row_size = (w * 3 + 3) & ~3
              pd_size  = row_size * h
              hdr = struct.pack('<2sIHHI', b'BM', 54 + pd_size, 0, 0, 54)
              dib = struct.pack('<IiiHHIIiiII', 40, w, -h, 1, 24, 0, pd_size, 2835, 2835, 0, 0)
              row = bytes([rgb[2], rgb[1], rgb[0]] * w) + bytes(row_size - w * 3)
              with open(path, 'wb') as f:
                  f.write(hdr + dib + row * h)

          os.makedirs('/tmp/fc_caps3', exist_ok=True)
          os.makedirs('/tmp/fc_refs3', exist_ok=True)
          write_bmp('/tmp/fc_caps3/frame_0030.bmp', 4, 4, (0,   0,   0))    # black
          write_bmp('/tmp/fc_refs3/frame_0030.bmp', 4, 4, (255, 255, 255))  # white
          print('Diverging BMPs written')
          PYEOF

          RC=0
          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  /tmp/fc_caps3/ \
            --reference-dir /tmp/fc_refs3/ \
            --threshold     0.05 \
            --json-out      /tmp/fc_results3.json || RC=$?

          if [ "$RC" -eq 1 ]; then
            echo "✅ Tool correctly returned exit 1 for frames exceeding threshold"
          else
            echo "❌ Expected exit 1 for diverging frames, got $RC"
            exit 1
          fi

      - name: Near-threshold RMSE — just below (delta=12, RMSE≈0.047, expect pass)
        run: |
          # For a uniform RGB image where every channel differs by `delta`, RMSE = delta/255.
          # delta=12 → RMSE = 12/255 ≈ 0.0471, which is just below threshold=0.05 → PASS.
          python3 - <<'PYEOF'
          import struct, os

          def write_bmp(path, w, h, rgb):
              row_size = (w * 3 + 3) & ~3
              pd_size  = row_size * h
              hdr = struct.pack('<2sIHHI', b'BM', 54 + pd_size, 0, 0, 54)
              dib = struct.pack('<IiiHHIIiiII', 40, w, -h, 1, 24, 0, pd_size, 2835, 2835, 0, 0)
              row = bytes([rgb[2], rgb[1], rgb[0]] * w) + bytes(row_size - w * 3)
              with open(path, 'wb') as f:
                  f.write(hdr + dib + row * h)

          os.makedirs('/tmp/fc_caps_near_pass', exist_ok=True)
          os.makedirs('/tmp/fc_refs_near_pass', exist_ok=True)
          # Reference: (128, 128, 128)  Captured: (140, 140, 140)  delta=12 per channel
          write_bmp('/tmp/fc_caps_near_pass/frame_0030.bmp', 4, 4, (140, 140, 140))
          write_bmp('/tmp/fc_refs_near_pass/frame_0030.bmp', 4, 4, (128, 128, 128))
          print(f'Near-threshold-pass BMPs written: expected RMSE = {12/255:.4f}')
          PYEOF

          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  /tmp/fc_caps_near_pass/ \
            --reference-dir /tmp/fc_refs_near_pass/ \
            --threshold     0.05 \
            --json-out      /tmp/fc_results_near_pass.json

          python3 - <<'PYEOF'
          import json
          data = json.load(open('/tmp/fc_results_near_pass.json'))
          r = data['results'][0]
          expected_rmse = 12 / 255.0
          assert abs(r['rmse'] - expected_rmse) < 1e-6, f"RMSE mismatch: {r['rmse']} vs {expected_rmse}"
          assert r['passed'], f"Expected PASS for delta=12 (RMSE {r['rmse']:.4f} < 0.05), got FAIL"
          print(f"✅ Near-threshold PASS: rmse={r['rmse']:.4f} < 0.05 → passed={r['passed']}")
          PYEOF

      - name: Near-threshold RMSE — just above (delta=13, RMSE≈0.051, expect fail)
        run: |
          # delta=13 → RMSE = 13/255 ≈ 0.0510, which is just above threshold=0.05 → FAIL.
          python3 - <<'PYEOF'
          import struct, os

          def write_bmp(path, w, h, rgb):
              row_size = (w * 3 + 3) & ~3
              pd_size  = row_size * h
              hdr = struct.pack('<2sIHHI', b'BM', 54 + pd_size, 0, 0, 54)
              dib = struct.pack('<IiiHHIIiiII', 40, w, -h, 1, 24, 0, pd_size, 2835, 2835, 0, 0)
              row = bytes([rgb[2], rgb[1], rgb[0]] * w) + bytes(row_size - w * 3)
              with open(path, 'wb') as f:
                  f.write(hdr + dib + row * h)

          os.makedirs('/tmp/fc_caps_near_fail', exist_ok=True)
          os.makedirs('/tmp/fc_refs_near_fail', exist_ok=True)
          # Reference: (128, 128, 128)  Captured: (141, 141, 141)  delta=13 per channel
          write_bmp('/tmp/fc_caps_near_fail/frame_0030.bmp', 4, 4, (141, 141, 141))
          write_bmp('/tmp/fc_refs_near_fail/frame_0030.bmp', 4, 4, (128, 128, 128))
          print(f'Near-threshold-fail BMPs written: expected RMSE = {13/255:.4f}')
          PYEOF

          RC=0
          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  /tmp/fc_caps_near_fail/ \
            --reference-dir /tmp/fc_refs_near_fail/ \
            --threshold     0.05 \
            --json-out      /tmp/fc_results_near_fail.json || RC=$?

          if [ "$RC" -ne 1 ]; then
            echo "❌ Expected exit 1 for delta=13 (RMSE≈0.051 > 0.05), got $RC"
            exit 1
          fi

          python3 - <<'PYEOF'
          import json
          data = json.load(open('/tmp/fc_results_near_fail.json'))
          r = data['results'][0]
          expected_rmse = 13 / 255.0
          assert abs(r['rmse'] - expected_rmse) < 1e-6, f"RMSE mismatch: {r['rmse']} vs {expected_rmse}"
          assert not r['passed'], f"Expected FAIL for delta=13 (RMSE {r['rmse']:.4f} > 0.05), got PASS"
          print(f"✅ Near-threshold FAIL: rmse={r['rmse']:.4f} > 0.05 → passed={r['passed']}")
          PYEOF
