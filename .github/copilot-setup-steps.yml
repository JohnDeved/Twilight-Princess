steps:
  - name: Install build and test dependencies
    run: |
      sudo apt-get update -q
      sudo apt-get install -y \
        ccache ninja-build \
        libgl-dev libx11-dev libwayland-dev libxrandr-dev libxinerama-dev \
        libxcursor-dev libxi-dev libxkbcommon-dev \
        libasound2-dev libpulse-dev libdbus-1-dev \
        xvfb x11-utils libegl-dev libgles2-mesa-dev \
        ffmpeg

  - name: Set up game data
    run: |
      python3 tools/setup_game_data.py \
        --data-dir data \
        --rom-dir orig/GZ2E01 \
        --extract-dir build/extract/GZ2E01 \
        --tools-dir build/tools
    env:
      ROMS_TOKEN: ${{ secrets.ROMS_TOKEN }}

  - name: Build PC port
    run: |
      cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=RelWithDebInfo \
        -DTP_VERSION=PC
      ninja -C build tp-pc
