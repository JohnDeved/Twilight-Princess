name: Port Test (PC Headless)

on:
  workflow_dispatch:
  push:
    branches:
      - port
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/port-test.yml'
      - 'tools/**'
      - 'milestone-baseline.json'
      - 'tests/**'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/port-test.yml'
      - 'tools/**'
      - 'milestone-baseline.json'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      ROMS_TOKEN: ${{ secrets.ROMS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ccache ninja-build libgl-dev libx11-dev libwayland-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libasound2-dev libpulse-dev libdbus-1-dev xvfb x11-utils libegl-dev libgles2-mesa-dev ffmpeg

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache disc image
        if: env.ROMS_TOKEN != ''
        uses: actions/cache@v4
        with:
          path: orig/GZ2E01/GZ2E01.rvz
          key: rom-GZ2E01-v1

      - name: Set up game data
        if: env.ROMS_TOKEN != ''
        run: |
          python3 tools/setup_game_data.py \
            --data-dir data \
            --rom-dir orig/GZ2E01 \
            --extract-dir build/extract/GZ2E01 \
            --tools-dir build/tools

      - name: Build PC port
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DTP_VERSION=PC
          ninja -C build tp-pc

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Run headless test
        if: success()
        env:
          TP_HEADLESS: "1"
          TP_TEST_FRAMES: "400"
          TP_SCREENSHOT: "logo_render.bmp"
          TP_VERIFY: "1"
          TP_VERIFY_DIR: "verify_output"
          TP_VERIFY_CAPTURE_FRAMES: "1,10,30,60,120,128"
        run: |
          set -o pipefail
          mkdir -p verify_output

          # === Phase 1: Logic test (Noop renderer, fast) ===
          # Runs without DISPLAY to use bgfx Noop backend.
          # Verifies game logic milestones (PROC_BG creation, dl_draws,
          # j3d_entries, heap stability) without slow softpipe rendering.
          # Uses 2000 frames to reach FRAMES_1800 milestone.
          # Phase 1 timeout: 240s (raised from 120s for 2000-frame run).
          # The Noop renderer fast-path in pal_tev_flush_draw skips TVB allocation
          # and vertex copy (frames 1-129 complete in <1s).
          # Frames 130+ may have one-time actor-list cycle recovery (cNdIt_Method cap
          # at 10000 iterations breaks circular linked-lists from camera Execute crash
          # at frame 130); after cycle break, frames 131-2000 are <5ms each.
          # TP_ENABLE_PROC_TITLE is NOT set in Phase 1, so daTitle auto-advance does
          # not run — game stays in play-scene loop for all 2000 frames.
          # 2000 frames complete well within 240s (estimated ~30s total).
          echo "=== Phase 1: Logic test (Noop renderer) ==="
          unset DISPLAY
          export TP_TEST_FRAMES=2000
          timeout -k 10 240s build/tp-pc 2>&1 | tee milestones_logic.log || true
          LOGIC_EXIT=${PIPESTATUS[0]}
          echo "Phase 1 exit: $LOGIC_EXIT"

          # === Phase 2: Pixel test (softpipe, title screen) ===
          # Runs with Xvfb + softpipe for pixel verification of logo/title.
          # TP_SKIP_DL_DRAWS=1 skips J3D display-list geometry (the heavy 3-D room
          # at frames 129+) while still rendering J2D overlays (title screen, HUD).
          # Capped at 130 frames: covers GOAL_INTRO_VISIBLE (frame 10) and title
          # screen renders (frames 10-120); stops before the slow actor-cycle frames
          # (130+) that can cause SIGTERM on slow CI machines.
          # GOAL_INTRO_VISIBLE triggers at frame >= 10 (GOAL_PIXEL_MILESTONE_FRAME_START).
          echo "=== Phase 2: Pixel test (softpipe + DL-skip) ==="
          Xvfb :99 -screen 0 640x480x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          for i in 1 2 3 4 5; do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done
          export GALLIUM_DRIVER=softpipe
          export LIBGL_ALWAYS_SOFTWARE=1
          export TP_VERIFY=1
          export TP_SCREENSHOT=logo_render.bmp
          export TP_TEST_FRAMES=130
          export TP_VERIFY_CAPTURE_FRAMES="1,10,30,60,120,128"
          export TP_SKIP_DL_DRAWS=1
          timeout -k 10 600s build/tp-pc 2>&1 | tee milestones_pixel.log || true
          PIXEL_EXIT=${PIPESTATUS[0]}
          echo "Phase 2 exit: $PIXEL_EXIT"
          kill $XVFB_PID 2>/dev/null || true

          # Merge logs: logic test has the game milestones, pixel test has renders
          cat milestones_logic.log milestones_pixel.log > milestones.log

          echo "exit_code=$PIXEL_EXIT" >> $GITHUB_OUTPUT
          # Convert raw frames to MP4 using ffmpeg (with debug text overlay from metadata)
          if [ -f verify_output/raw_frames.bin ]; then
            FRAME_COUNT=$(stat -c%s verify_output/raw_frames.bin 2>/dev/null || echo 0)
            EXPECTED_FRAME_SIZE=$((640 * 480 * 4))
            if [ "$FRAME_COUNT" -gt 0 ] && [ "$EXPECTED_FRAME_SIZE" -gt 0 ]; then
              NUM_FRAMES=$((FRAME_COUNT / EXPECTED_FRAME_SIZE))
              echo "Raw video: $NUM_FRAMES frames captured"
              # First pass: raw video without text overlay
              ffmpeg -y -f rawvideo -pixel_format rgba -video_size 640x480 \
                -framerate 30 -i verify_output/raw_frames.bin \
                -c:v libx264 -pix_fmt yuv420p -crf 18 \
                verify_output/render_progress.mp4 2>/dev/null && \
                echo "MP4 created: $(ls -la verify_output/render_progress.mp4)" || \
                echo "ffmpeg conversion failed"
              # Clean up large raw file
              rm -f verify_output/raw_frames.bin
            fi
          fi
          echo "Captured BMP frames: $(ls verify_output/frame_*.bmp 2>/dev/null | wc -l)"

          # === RASC regression gate ===
          # frame_0120 (Phase 2 title screen, RASC-injected with white mat_color) must
          # stay >= 80% nonblack.  A drop below this threshold indicates the
          # GX_CC_RASC → material-color injection path regressed (e.g. passclr_uses_rasc
          # check removed, apply_rasc_color() broken, or PASSCLR override logic changed).
          # This gate is independent of Phase 3: it fires on Phase 2 (J2D title screen)
          # where TP_SKIP_DL_DRAWS=1 still lets 2D/RASC draws through softpipe.
          echo "=== RASC regression gate (frame_0120 >= 80% nonblack) ==="
          python3 tools/check_bmp_coverage.py verify_output/frame_0120.bmp \
            --require frame_0120:80 || \
            echo "⚠️  RASC gate FAILED: frame_0120 dropped below 80% — check passclr_uses_rasc in gx_tev.cpp"

          # Phase 3: 3D room frame capture (frame 129).
          # The 3D BG actor lives only frames 128-129 at game-logic speed.
          # Delegated to tools/quick-test.sh --phase 3 (shared with self-test.sh).
          # --best-effort: gate failures are diagnostic only (CI still passes).
          unset DISPLAY
          tools/quick-test.sh --phase 3 --binary build/tp-pc \
            --output-dir verify_output_3d --best-effort

          # Phase 4: Gameplay intro frame capture (frame 200, PROC_TITLE J2D content).
          # PROC_TITLE created with TP_ENABLE_PROC_TITLE=1 after 3D BG actor exits.
          # Gate: frame_0030 >= 1% nonblack (maroon Nintendo logo on black background).
          # Delegated exclusively to tools/quick-test.sh --phase 4 (sole implementation
          # shared with self-test.sh).  --best-effort: CI still passes on gate failure;
          # gate results are reported in quick-test.sh output and Phase 4 milestone log.
          unset DISPLAY
          tools/quick-test.sh --phase 4 --binary build/tp-pc \
            --output-dir verify_output_gameplay --best-effort

      - name: Parse milestones
        if: always()
        run: |
          # || true: Always produce the report JSON for the PR comment step.
          # Failures are surfaced in the regression check, not here.
          # Use Phase 1 (logic) log only for the 16/16 boot milestone count
          # to avoid duplicate IDs from Phase 2 re-emitting boot milestones.
          # --goal-log milestones_pixel.log supplements goal milestones (id>=100,
          # e.g. GOAL_INTRO_VISIBLE) from Phase 2, which requires a real framebuffer.
          # --goal-log .../milestones_phase4.log supplements GOAL_TITLE_VISIBLE
          # (id=103) from Phase 4, which fires at frame >= 30 when logo-scene
          # frames are non-black (validates clearEfb black-background fix and
          # confirms the logo pipeline is functional).
          python3 tools/parse_milestones.py milestones_logic.log \
            --output milestone-summary.json \
            --min-milestone 5 \
            --goal-log milestones_pixel.log \
            --goal-log verify_output_gameplay/milestones_phase4.log || true

      - name: Verify port subsystems
        if: always()
        run: |
          # || true: Always produce the report JSON for the PR comment step.
          # Rendering issues are surfaced in the PR comment, not as build failures.
          # --update-golden: save captured frames as new golden references when none exist
          # (first CI run after a rendering change seeds new baselines automatically).
          python3 tools/verify_port.py milestones.log \
            --output verify-report.json \
            --verify-dir verify_output \
            --golden-dir tests/golden \
            --render-baseline tests/render-baseline.json \
            --update-golden \
            --check-all || true

      - name: Validate draw-call telemetry
        if: always()
        run: |
          # Run the draw-call and J3D telemetry validator.
          # Extracts peak dl_draws, chain-invalid counts, and J3D flow stalls.
          # TP_TELEMETRY_PEAK_DL_MIN=7000: hard-fail if peak dl_draws drops below 7000.
          # Protects the vrbox J3DModel→J3DModelData cast fix that produces 7615 draws
          # on frames 128-129. Threshold 7000 = 92% of 7615, allows 8% margin.
          # TP_TELEMETRY_ENFORCE_PEAK_DL=1: peak gate is a hard fail (not just a warning).
          # DL_SUSTAIN not enforced: BG actor only lives 2 frames (128-129) before the
          # opening scene transitions to Title (PROC_TITLE created in dScnPly_Execute).
          # Peak gate already protects the 7615-draw vrbox cast fix. Sustain is a warning.
          # Use milestones.log (merged Phase 1+2) as first arg so GOAL_INTRO_VISIBLE
          # from Phase 2 is visible in the telemetry summary.
          # TP_TELEMETRY_CRASH_FRAME=129: PROC_CAMERA Execute crash corrupts the actor
          # list at frame 129 (not 130 as the default assumes); chain_cycle events at
          # frame 129 are expected post-crash behavior, not new corruption sources.
          TP_TELEMETRY_ENFORCE_PEAK_DL=1 TP_TELEMETRY_PEAK_DL_MIN=7000 \
          TP_TELEMETRY_CRASH_FRAME=129 \
          python3 tools/validate_telemetry.py milestones.log milestones_logic.log \
            > telemetry-validation.txt 2>&1
          EXIT_CODE=$?
          cat telemetry-validation.txt
          exit $EXIT_CODE

      - name: Check milestone regression
        id: regression
        if: always()
        run: |
          python3 tools/check_milestone_regression.py milestone-summary.json \
            --baseline milestone-baseline.json \
            --output regression-report.json \
            --auto-update || true

          # Extract key fields for the PR comment step
          if [ -f regression-report.json ]; then
            echo "status=$(python3 -c "import json; print(json.load(open('regression-report.json'))['status'])")" >> $GITHUB_OUTPUT
            echo "current=$(python3 -c "import json; print(json.load(open('regression-report.json'))['current_milestone_count'])")" >> $GITHUB_OUTPUT
            echo "baseline=$(python3 -c "import json; print(json.load(open('regression-report.json'))['baseline_milestone_count'])")" >> $GITHUB_OUTPUT
            echo "delta=$(python3 -c "import json; print(json.load(open('regression-report.json'))['delta'])")" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated baseline
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ ! -f milestone-baseline.json ]; then
            echo "No baseline file found, skipping"
            exit 0
          fi
          if git diff --quiet milestone-baseline.json; then
            echo "Baseline unchanged, nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add milestone-baseline.json
            COMMIT_MSG="ci: auto-update milestone baseline"
            if [ -f regression-report.json ]; then
              COMMIT_MSG="ci: auto-update milestone baseline ($(python3 -c "import json; r=json.load(open('regression-report.json')); print(f\"{r['baseline_milestone_count']} → {r['current_milestone_count']}\")" 2>/dev/null || echo "improved"))"
            fi
            git commit -m "$COMMIT_MSG"
            # Pull any new commits (e.g. from Copilot agent) before pushing
            git pull --rebase origin ${{ github.head_ref }} || true
            git push origin HEAD:${{ github.head_ref }} || echo "⚠️ Push failed (concurrent updates) — baseline will be updated on next run"
            echo "✅ Baseline committed and pushed"
          fi

      - name: Commit new golden references
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          # Auto-commit any new golden reference BMPs saved by verify_port.py --update-golden.
          # Only new files are saved (existing golden refs are never overwritten by --update-golden).
          # This ensures the first CI run after a rendering fix seeds correct golden baselines.
          NEW_GOLDENS=$(git ls-files --others --exclude-standard tests/golden/frame_*.bmp 2>/dev/null | wc -l || echo 0)
          if [ "${NEW_GOLDENS}" -gt 0 ] 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add tests/golden/frame_*.bmp 2>/dev/null || true
            GOLDEN_LIST=$(git diff --cached --name-only | grep 'tests/golden/frame_' | sed 's|tests/golden/||' | tr '\n' ' ')
            git commit -m "ci: add golden reference BMPs (${GOLDEN_LIST})" || echo "Nothing to commit"
            git pull --rebase origin ${{ github.head_ref }} || echo "⚠️ Rebase failed — golden commit may not be pushed"
            git push origin HEAD:${{ github.head_ref }} || echo "⚠️ Push failed — goldens will be seeded on next run"
            echo "✅ New golden references committed: ${GOLDEN_LIST}"
          else
            echo "No new golden reference BMPs to commit"
          fi

      - name: Frame comparison (perceptual diff vs GCN reference)
        if: always()
        id: frame_compare
        run: |
          # Compare captured frames against reference frames in tests/reference_frames/.
          # Uses tools/frame_compare/frame_compare.py (RMSE + optional SSIM).
          #
          # --allow-missing-reference: skip gracefully when no reference frames are
          # committed yet (expected during early development). Set to empty once
          # reference frames are present to enforce the gate.
          pip install --quiet Pillow 2>/dev/null || echo "Pillow install failed — PNG diff output disabled, BMP fallback active"

          mkdir -p frame_compare_diffs

          python3 tools/frame_compare/frame_compare.py \
            --captured-dir  verify_output/ \
            --reference-dir tests/reference_frames/ \
            --diff-dir      frame_compare_diffs/ \
            --threshold     0.05 \
            --json-out      frame-compare-results.json \
            --allow-missing-reference \
          && echo "frame_compare_status=pass" >> $GITHUB_OUTPUT \
          || echo "frame_compare_status=fail" >> $GITHUB_OUTPUT

          # Also compare Phase 3 (3D room) and Phase 4 (gameplay) captures when present
          if [ -d verify_output_3d ] && ls verify_output_3d/*.bmp 2>/dev/null | head -1 >/dev/null; then
            python3 tools/frame_compare/frame_compare.py \
              --captured-dir  verify_output_3d/ \
              --reference-dir tests/reference_frames/ \
              --diff-dir      frame_compare_diffs/ \
              --threshold     0.05 \
              --allow-missing-reference 2>/dev/null || true
          fi

          if [ -f frame-compare-results.json ]; then
            python3 -c "import json; r=json.load(open('frame-compare-results.json')); passed=r.get('passed',True); results=r.get('results',[]); n_pass=sum(1 for x in results if x.get('passed')); n_fail=sum(1 for x in results if not x.get('passed')); print(f'Frame compare: {n_pass} passed, {n_fail} failed, overall={passed}')"
          fi

      - name: Convert frames to PNG
        if: always()
        run: |
          # convert_frames.py converts BMP→PNG for embedding.
          # Phase 2 (TP_SKIP_DL_DRAWS) frames — verify_output/frame_NNNN.bmp
          python3 tools/convert_frames.py verify_output \
            --png-dir verify_png \
            --fps 4 || true
          # Phase 3 (3D room, centroid camera) — prefix "3d_" avoids name collision.
          # frame_0129 is the key 3D geometry frame (~75% nonblack).
          python3 tools/convert_frames.py verify_output_3d \
            --png-dir verify_png \
            --name-prefix 3d_ || true
          # Phase 4 (PROC_TITLE/gameplay intro) — prefix "p4_" distinguishes from P2.
          # frame_0030 shows the maroon Nintendo logo in full-DL-draw mode.
          python3 tools/convert_frames.py verify_output_gameplay \
            --png-dir verify_png \
            --name-prefix p4_ || true
          # If MP4 already generated from raw frames, just report
          if [ -f verify_output/render_progress.mp4 ]; then
            echo "✅ MP4 already generated from raw frame capture"
            ls -la verify_output/render_progress.mp4
          fi

      - name: Post PR comment with results
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Load milestone summary
            let summary = {};
            try {
              summary = JSON.parse(fs.readFileSync('milestone-summary.json', 'utf8'));
            } catch (e) {
              summary = { milestones_reached_count: 0, milestones_reached: [] };
            }

            // Load regression report
            let regression = {};
            try {
              regression = JSON.parse(fs.readFileSync('regression-report.json', 'utf8'));
            } catch (e) {
              regression = { status: 'unknown', current_milestone: -1, baseline_milestone: -1 };
            }

            // Load verification report
            let verify = { checks: {} };
            try {
              verify = JSON.parse(fs.readFileSync('verify-report.json', 'utf8'));
            } catch (e) {
              // no verification data
            }

            // Upload frame PNGs to a release for embedding in the comment
            const pngDir = 'verify_png';
            const path = require('path');
            const imageUrls = {};
            let capturedPngs = [];

            if (fs.existsSync(pngDir)) {
              capturedPngs = fs.readdirSync(pngDir).filter(f => f.endsWith('.png')).sort();
            }
            const hasVideo = fs.existsSync('verify_output/render_progress.mp4');

            if (capturedPngs.length > 0 || hasVideo) {
              // Find or create a prerelease for CI render assets
              const tag = 'ci-renders';
              let release;
              try {
                const existing = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: tag,
                });
                release = existing.data;
              } catch (e) {
                try {
                  const created = await github.rest.repos.createRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_name: tag,
                    name: 'CI Render Screenshots',
                    body: 'Automatically updated by port-test CI. Contains render frame captures.',
                    prerelease: true,
                  });
                  release = created.data;
                } catch (e2) {
                  console.log(`Could not create release: ${e2.message}`);
                }
              }

              if (release) {
                // Delete old assets
                for (const asset of release.assets || []) {
                  try {
                    await github.rest.repos.deleteReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      asset_id: asset.id,
                    });
                  } catch (e) {}
                }

                // Upload PNGs
                for (const png of capturedPngs) {
                  const filePath = path.join(pngDir, png);
                  const data = fs.readFileSync(filePath);
                  try {
                    const uploaded = await github.rest.repos.uploadReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: release.id,
                      name: png,
                      data: data,
                      headers: {
                        'content-type': 'application/octet-stream',
                        'content-length': data.length,
                      },
                    });
                    imageUrls[png] = uploaded.data.browser_download_url;
                  } catch (e) {
                    console.log(`Failed to upload ${png}: ${e.message}`);
                  }
                }

                // Upload video
                if (hasVideo) {
                  const videoData = fs.readFileSync('verify_output/render_progress.mp4');
                  try {
                    const uploaded = await github.rest.repos.uploadReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: release.id,
                      name: 'render_progress.mp4',
                      data: videoData,
                      headers: {
                        'content-type': 'application/octet-stream',
                        'content-length': videoData.length,
                      },
                    });
                    imageUrls['video'] = uploaded.data.browser_download_url;
                  } catch (e) {
                    console.log(`Failed to upload video: ${e.message}`);
                  }
                }
              }
            }

            // Artifacts URL for this run
            const artifactsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Status emoji
            const statusEmoji = {
              'improved': '🎉',
              'same': '✅',
              'regressed': '🚨',
              'unknown': '❓'
            };

            const emoji = statusEmoji[regression.status] || '❓';
            const milestoneCount = summary.milestones_reached_count ?? 0;
            const totalMilestones = 16;

            // Build the comment body
            let body = `## ${emoji} Port Test Results\n\n`;
            body += `| Metric | Value |\n|---|---|\n`;
            body += `| **Milestones Reached** | ${milestoneCount} / ${totalMilestones} |\n`;
            body += `| **Baseline** | ${regression.baseline_milestone_count ?? 'N/A'} |\n`;
            body += `| **Status** | ${(regression.status || 'unknown').toUpperCase()} |\n`;
            body += `| **Delta** | ${regression.delta >= 0 ? '+' : ''}${regression.delta ?? 0} |\n`;
            body += `| **Integrity** | ${summary.integrity?.valid ? '✅ VALID' : '🚫 FAILED'} |\n`;

            // Integrity check failures
            if (summary.integrity && !summary.integrity.valid) {
              body += `\n### 🚫 Integrity Check Failed\n`;
              body += `> The following milestones were disqualified and excluded from the count:\n\n`;
              for (const issue of (summary.integrity.issues || [])) {
                body += `- ❌ ${issue}\n`;
              }
              const disqualified = summary.integrity.disqualified_milestones || [];
              if (disqualified.length > 0) {
                body += `\n**Disqualified milestones:** ${disqualified.join(', ')}\n`;
              }
              body += `\n> Fix the underlying issues — disqualified milestones do not count.\n`;
            }

            // Milestones reached
            if (summary.milestones_reached && summary.milestones_reached.length > 0) {
              body += `\n### Milestones Reached\n`;
              body += summary.milestones_reached.map(m => `- ✅ ${m}`).join('\n') + '\n';
            }

            // Crash info
            if (summary.crash) {
              body += `\n### ⚠️ Crash Detected\n`;
              body += `Signal: ${summary.crash.signal || 'unknown'}\n`;
            }

            // Top stubs
            if (summary.stubs_hit && summary.stubs_hit.length > 0) {
              body += `\n### 📊 Top Unimplemented Stubs\n`;
              body += `| Stub | Hits |\n|---|---|\n`;
              for (const s of summary.stubs_hit.slice(0, 10)) {
                body += `| \`${s.stub}\` | ${s.hits} |\n`;
              }
            }

            // Frame validation
            if (summary.frame_validation) {
              const fv = summary.frame_validation;
              body += `\n### 🖼️ Frame Validation\n`;
              body += `| Metric | Value |\n|---|---|\n`;
              body += `| Stub count | ${fv.stub_count} |\n`;
              body += `| Draw calls | ${fv.draw_calls} |\n`;
              body += `| Valid verts | ${fv.valid_verts} |\n`;
              body += `| Valid frame | ${fv.valid ? '✅' : '❌'} |\n`;
            }

            // Timing
            if (summary.timing && Object.keys(summary.timing).length > 0) {
              body += `\n### ⏱️ Timing\n`;
              body += `| Milestone | Time (ms) |\n|---|---|\n`;
              for (const [name, ms] of Object.entries(summary.timing)) {
                body += `| ${name} | ${ms} |\n`;
              }
            }

            // Subsystem verification results
            if (verify.checks && Object.keys(verify.checks).length > 0) {
              body += `\n### 🔍 Subsystem Verification\n`;
              body += `| Subsystem | Status | Details |\n|---|---|---|\n`;
              for (const [name, check] of Object.entries(verify.checks)) {
                const checkEmoji = check.passed ? '✅' : '❌';
                let detail = '';
                if (check.details) {
                  if (name === 'rendering') {
                    const fw = check.details.frames_with_draws ?? 0;
                    const fn = check.details.frames_nonblack ?? 0;
                    const rh = check.details.render_health_pct ?? 0;
                    detail = `${fw} frames with draws, ${fn} non-black, ${rh}% health`;
                  } else if (name === 'input') {
                    detail = check.details.note || `${check.details.input_events ?? 0} events, ${check.details.input_responses ?? 0} responses`;
                  } else if (name === 'audio') {
                    detail = check.details.note || `${check.details.audio_frames_active ?? 0} active, ${check.details.audio_frames_nonsilent ?? 0} non-silent`;
                  }
                }
                if (check.issues && check.issues.length > 0) {
                  detail += (detail ? ' · ' : '') + check.issues.join('; ');
                }
                body += `| ${name} | ${checkEmoji} | ${detail} |\n`;
              }

              // Render pipeline health breakdown
              const pipelineData = verify.checks?.rendering?.details?.pipeline;
              if (pipelineData && pipelineData.stages) {
                body += `\n### 🔧 Render Pipeline Health\n`;
                body += `| Stage | Status | Details |\n|---|---|---|\n`;
                const stageNames = {
                  geometry: '📐 Geometry',
                  textures: '🖼️ Textures',
                  shaders: '🎨 Shaders',
                  depth: '📏 Depth Test',
                  blend: '🔮 Blending',
                  primitives: '🔺 Primitives',
                };
                for (const [stageName, stage] of Object.entries(pipelineData.stages)) {
                  const stageEmoji = stage.ok ? '✅' : '❌';
                  const displayName = stageNames[stageName] || stageName;
                  const details = Object.entries(stage)
                    .filter(([k]) => k !== 'ok')
                    .map(([k, v]) => `${k}=${Array.isArray(v) ? v.join(',') : v}`)
                    .join(', ');
                  body += `| ${displayName} | ${stageEmoji} | ${details} |\n`;
                }
                body += `| **Visual Complexity** | | **${pipelineData.visual_complexity ?? 0}/100** |\n`;
              }

              // Frame progression
              const progressionData = verify.checks?.rendering?.details?.progression;
              if (progressionData) {
                const hc = progressionData.hash_changes ?? 0;
                const dh = progressionData.distinct_hashes ?? 0;
                body += `\n📈 **Frame progression:** ${hc} hash changes, ${dh} distinct hashes\n`;
              }
            }

            // Render screenshots — embed uploaded images
            const renderCheck = verify.checks?.rendering;
            const fbAnalyses = renderCheck?.details?.captured_frames;
            const frameHashes = renderCheck?.details?.frame_hashes;
            const sortedPngs = Object.keys(imageUrls).filter(k => k !== 'video').sort();

            if (sortedPngs.length > 0) {
              body += `\n### 📸 Render Screenshots\n`;
              // Always show 3D geometry frames (3d_ prefix) inline first — most visually
              // informative (centroid camera captures actual 3D room geometry, ~75% nonblack).
              const d3Frames = sortedPngs.filter(p => p.startsWith('3d_'));
              // Phase 2 (TP_SKIP_DL_DRAWS) logo frames — shows RASC pipeline health.
              const p2Frames = sortedPngs.filter(p => !p.startsWith('3d_') && !p.startsWith('p4_'));
              // Phase 4 (full DL draws) gameplay frames — lower priority, in collapsible.
              const p4Frames = sortedPngs.filter(p => p.startsWith('p4_'));

              // Inline: 3D frames + up to 3 Phase 2 key frames (0010, 0030, 0120)
              const p2KeyNames = ['frame_0010.png', 'frame_0030.png', 'frame_0120.png'];
              const p2Key = p2KeyNames.filter(n => p2Frames.includes(n));
              const inlineFrames = [...d3Frames, ...p2Key];

              if (d3Frames.length > 0) {
                body += `\n**🏛️ 3D Scene (Phase 3 — centroid camera)**\n`;
                for (const png of d3Frames) {
                  const label = png.replace('3d_frame_', '').replace('.png', '');
                  body += `\n_Frame ${label}_\n\n`;
                  body += `![3D frame ${label}](${imageUrls[png]})\n`;
                }
              }

              if (p2Key.length > 0) {
                body += `\n**🎮 Phase 2 — Logo/Title Screen (TP_SKIP_DL_DRAWS)**\n`;
                for (const png of p2Key) {
                  const label = png.replace('frame_', '').replace('.png', '');
                  body += `\n_Frame ${label}_\n\n`;
                  body += `![Frame ${label}](${imageUrls[png]})\n`;
                }
              }

              // Collapsible section with Phase 4 + remaining Phase 2 frames
              const rest = sortedPngs.filter(p => !inlineFrames.includes(p));
              if (rest.length > 0) {
                body += `\n<details><summary>📂 All other captured frames (${rest.length})</summary>\n\n`;
                if (p4Frames.length > 0) {
                  body += `**Phase 4 — Full DL Draws (PROC_TITLE enabled)**\n\n`;
                }
                for (const png of rest) {
                  const label = png.replace(/^(3d_|p4_)?frame_/, '').replace('.png', '');
                  const prefix = png.startsWith('3d_') ? '3D-' : png.startsWith('p4_') ? 'P4-' : 'P2-';
                  body += `**${prefix}Frame ${label}** · ![${prefix}Frame ${label}](${imageUrls[png]})\n\n`;
                }
                body += `</details>\n`;
              }
            } else if (fbAnalyses && fbAnalyses.length > 0) {
              // Fallback: show text-only frame analysis if no images uploaded
              body += `\n### 📸 Captured Frames\n`;
              body += `| Frame | Non-Black | Avg Color | Hash |\n|---|---|---|---|\n`;
              for (const fa of fbAnalyses) {
                const frameNum = fa.file?.replace('frame_', '').replace('.bmp', '') || '?';
                const nb = fa.pct_nonblack ?? 0;
                const ac = fa.avg_color || [0,0,0];
                const hash = frameHashes?.[frameNum] || '—';
                body += `| ${frameNum} | ${nb}% | \`${ac.join(',')}\` | \`${hash}\` |\n`;
              }
            }

            // Video embed
            if (imageUrls['video']) {
              body += `\n### 🎬 Render Progress Video\n`;
              body += `<video src="${imageUrls['video']}" controls autoplay loop muted width="640"></video>\n\n`;
              body += `[📥 Download render_progress.mp4](${imageUrls['video']})\n`;
            }

            // Golden image comparisons
            const goldenComps = renderCheck?.details?.golden_comparisons;
            if (goldenComps && goldenComps.length > 0) {
              const hasAnyGolden = goldenComps.some(c => c.has_golden);
              if (hasAnyGolden) {
                body += `\n### 🖼️ Golden Image Comparison\n`;
                body += `| Frame | RMSE | % Different | Status |\n|---|---|---|---|\n`;
                for (const cmp of goldenComps) {
                  if (cmp.has_golden) {
                    const status = cmp.identical ? '✅ Identical' : (cmp.rmse <= 5.0 ? '✅ Within tolerance' : '❌ REGRESSION');
                    body += `| ${cmp.frame} | ${cmp.rmse ?? 0} | ${cmp.pct_different ?? 0}% | ${status} |\n`;
                  }
                }
              }
            }

            // Frame comparison results (GCN reference vs PC port)
            let frameCmp = null;
            try { frameCmp = JSON.parse(fs.readFileSync('frame-compare-results.json', 'utf8')); } catch (e) {}
            if (frameCmp && frameCmp.results && frameCmp.results.length > 0) {
              body += `\n### 🎯 Frame Comparison (GCN Reference)\n`;
              body += `| Frame | RMSE | SSIM | % Diff | Status |\n|---|---|---|---|---|\n`;
              for (const r of frameCmp.results) {
                const fname = r.captured ? r.captured.split('/').pop() : '?';
                const status = r.error ? `❌ ${r.error}` : (r.passed ? '✅ PASS' : `❌ FAIL (>${r.threshold})`);
                const ssim = (r.ssim != null) ? r.ssim.toFixed(3) : '—';
                body += `| ${fname} | ${r.rmse?.toFixed(4) ?? '—'} | ${ssim} | ${r.pct_diff?.toFixed(1) ?? '—'}% | ${status} |\n`;
              }
              if (!frameCmp.passed) {
                body += `\n⚠️ **Frame comparison failed** — some frames exceeded the RMSE threshold.\n`;
              }
            } else {
              body += `\n### 🎯 Frame Comparison (GCN Reference)\n`;
              body += `ℹ️ No reference frames in \`tests/reference_frames/\` yet. `;
              body += `See \`tools/frame_compare/README.md\` for instructions.\n`;
            }

            // Artifacts download link
            body += `\n### 📦 Artifacts\n`;
            body += `[Download full test results](${artifactsUrl})\n`;

            body += `\n---\n`;
            body += `<sub>🤖 Generated by port-test CI · `;
            body += `Commit: ${context.sha.substring(0, 7)}</sub>\n`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              (c.body.includes('Port Test Results') && c.body.includes('Milestones Reached'))
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: port-test-results
          path: |
            milestones.log
            milestone-summary.json
            regression-report.json
            verify-report.json
            telemetry-validation.txt
            frame-compare-results.json
            verify_output/
            verify_output_3d/
            verify_output_gameplay/
            frame_compare_diffs/
            verify_png/
            logo_render.bmp
